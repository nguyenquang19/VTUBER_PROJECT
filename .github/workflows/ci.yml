# ============================================
# CI — chạy test tự động mỗi lần push / pull request
# Chỉ test phần LOGIC THUẦN (core) — KHÔNG cần GPU/model/vLLM.
# Đây là mục đích của thiết kế mock: CI chạy nhanh, không tốn tài nguyên.
# ============================================
name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # chỉ cài thứ cần để test logic thuần (không cài vllm/torch/tts)
          pip install pyyaml pytest pytest-asyncio

      - name: Run tests
        run: pytest -v

      - name: Smoke test (khung chạy được, không crash)
        run: |
          set +e
          timeout 8 python main.py > /dev/null 2>&1
          code=$?
          set -e
          if [ "$code" -eq 124 ] || [ "$code" -eq 0 ]; then
            echo "OK — khung chạy bình thường (exit=$code)"
          else
            echo "CRASH — exit=$code"
            exit 1
          fi
