# ============================================
# config.yaml — tham số vận hành (tách khỏi code để chỉnh không cần sửa code)
# ============================================

orchestrator:
  tick_interval: 1.2              # nhịp đánh giá (giây)
  silence_before_monologue: 3.0   # im bao lâu thì tự nói
  barge_in_threshold: 70          # điểm tin phải vượt để ngắt lời
  reply_threshold: 25             # điểm tối thiểu để trả lời "nghiêm túc"
  casual_pickup_prob: 0.35        # xác suất nhặt tin thường lên đọc (ấm/lạnh)

monologue:
  min_develop: 2                  # tối thiểu số câu phát triển 1 topic
  max_develop: 4                  # tối đa (chống lê thê)
  cooldown_sec: 180               # thời gian trước khi lặp lại 1 topic

persona:
  core_path: "config/persona_core.yaml"
  evolving_path: "config/persona_evolving.yaml"

llm:
  max_tokens: 200                 # trả lời ngắn (hợp stream)
  temperature: 0.85
  frequency_penalty: 0.06         # giảm lặp từ / AI slop
  thinking_mode: false            # TẮT khi live (Qwen3.5 có thinking)

logging:
  level: "INFO"
