# --- Mood gần đây (ảnh hưởng sắc thái, reflection cập nhật) ---
current_mood: "hào hứng, muốn tám chuyện"

# --- Regulars: người quen (tóm tắt; chi tiết nằm ở memory/Neo4j) ---
