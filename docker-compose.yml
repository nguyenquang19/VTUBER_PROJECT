# ============================================
# docker-compose.yml — hạ tầng cho AI VTuber
#   - Qdrant: vector DB cho memory (Bước E)
#   - Redis:  message bus khi tách nhiều máy (V2) + cache state
#
# Chạy:   docker compose up -d
# Dừng:   docker compose down
# Xem:    docker compose ps
#
# LƯU Ý: dữ liệu lưu trong ./data/ (đã nằm trong .gitignore, KHÔNG commit).
# ============================================
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vtuber_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"        # REST API
      - "6334:6334"        # gRPC (nhanh hơn, dùng nếu muốn)
    volumes:
      - ./data/qdrant:/qdrant/storage
    # Qdrant nhẹ, không cần GPU. Dùng cho lưu/truy hồi ký ức.

  redis:
    image: redis:7-alpine
    container_name: vtuber_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --save 60 1 --appendonly yes
    # Save state định kỳ. V1 chưa bắt buộc, nhưng dựng sẵn cho tiện.

# Không khai báo top-level volumes: dùng bind mount ./data để dễ backup & xoá.
